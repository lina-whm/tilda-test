<style>
/* TASK 1: Sticky + Step-by-Step CSS */
.t1-container {
    position: relative;
    height: 300vh;
}

.t1-sticky {
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    overflow: hidden;
}

.t1-left {
    width: 50%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px;
    background: #0d0d0d;
}

.t1-right {
    width: 50%;
    height: 100vh;
    position: relative;
    overflow: hidden;
    background: #111;
}

.t1-title {
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 700;
    margin-bottom: 30px;
    opacity: 0.2;
    transition: opacity 0.3s ease, transform 0.3s ease;
    transform: translateX(-20px);
    color: #888;
}

.t1-title.active {
    opacity: 1;
    transform: translateX(0);
    color: #fff;
}

.t1-img-item {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    transform: translateY(100px);
}

.t1-img-item.visible {
    opacity: 1;
    transform: translateY(0);
}

.t1-img-item.hidden {
    transform: translateY(-100px);
    opacity: 0;
}

.t1-img-placeholder {
    width: 90%;
    height: 90%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(48px, 8vw, 96px);
    font-weight: 900;
    color: #1a1a1a;
    background: linear-gradient(135deg, #1f1f1f 0%, #141414 100%);
    border-radius: 12px;
}

@media (max-width: 960px) {
    .t1-sticky { flex-direction: column; }
    .t1-left, .t1-right { width: 100%; height: 50vh; }
    .t1-right { height: 50vh; }
}
</style>

<script>
// TASK 1: Sticky + Step-by-Step JS
(function() {
    const container = document.querySelector('.t1-container');
    const titles = document.querySelectorAll('.t1-title');
    const images = document.querySelectorAll('.t1-img-item');
    if (!container || !titles.length) return;

    const titleCount = titles.length;
    let currentStep = -1;
    let ticking = false;

    function update() {
        const rect = container.getBoundingClientRect();
        const progress = (-rect.top) / (container.offsetHeight - window.innerHeight);
        const clamped = Math.max(0, Math.min(1, progress));
        const newStep = Math.floor(clamped * titleCount);

        if (newStep !== currentStep) {
            currentStep = newStep;
            titles.forEach((t, i) => t.classList.toggle('active', i === currentStep));
            images.forEach((img, i) => {
                img.classList.remove('visible', 'hidden');
                if (i < currentStep) img.classList.add('hidden');
                else if (i === currentStep) img.classList.add('visible');
            });
        }
        ticking = false;
    }

    window.addEventListener('scroll', function() {
        if (!ticking) {
            requestAnimationFrame(update);
            ticking = true;
        }
    }, { passive: true });

    update();
})();
</script>
